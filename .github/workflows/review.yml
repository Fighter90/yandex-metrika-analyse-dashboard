name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts; review when the PR is ready.
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    # The `secrets` context is not allowed in `if:`; expose it via env and gate the step.
    # Until ANTHROPIC_API_KEY is set the review step is skipped and the job stays green.
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude review
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this PR for the ProductCamp conversion-analytics tool. Be concise; flag only
            real issues with file:line. Check specifically:
            - Anti-hallucination: every number traceable to raw_responses; no Date.now() in the
              report render path; no LLM calls in production report path.
            - Hypothesis methodology enforced: hypothesis format {subject/action/solution/condition},
              >=3 hidden assumptions across behavior/market/tech, >=2 validation methods,
              traffic-light criteria + deadline, ICE = I*C*E (product, not mean).
            - TypeScript strict (no `any` without // FIXME), tests present, 100% coverage on changed logic.
            - No dependency added outside the fixed stack without an ADR in docs/decisions/.
            - "Заявка != оплата": application vs payment kept distinct.
